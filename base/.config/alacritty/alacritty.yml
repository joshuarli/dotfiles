env:
  TERM: xterm-256color

window:
  decorations: none
  padding:
    x: 16
    y: 16
  startup_mode: Fullscreen

font:
  normal:
    family: Hack
  bold:
    family: Hack
  size: 8

live_config_reload: false

mouse:
  hints:
    launcher:
      program: none

key_bindings:
  # NOTE: this syntax means you need to hold both mod keys down, not one of them
  - { key: C, mods: Control|Shift, action: Copy }
  - { key: V, mods: Control|Shift, action: Paste }

# Colors (Dracula, but with black bg)
colors:
  primary:
    background: '0x000000'
    foreground: '0xf8f8f2'

  normal:
    # dark grey for black so micro can show stuff like indentchars
    black:   '0x333333'
    red:     '0xff5555'
    green:   '0x50fa7b'
    yellow:  '0xf1fa8c'
    blue:    '0xcaa9fa'
    magenta: '0xff79c6'
    cyan:    '0x8be9fd'
    white:   '0xbfbfbf'

  bright:
    black:   '0x575b70'
    red:     '0xff6e67'
    green:   '0x5af78e'
    yellow:  '0xf4f99d'
    blue:    '0xcaa9fa'
    magenta: '0xff92d0'
    cyan:    '0x9aedfe'
    white:   '0xe6e6e6'
